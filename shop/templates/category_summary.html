{% extends "base.html" %}
{% load static %}
{% block content %}

<main id="main" class="main" style="margin-left: 0px; margin-top: 100px;">
  <h1 class="text-center">All Categories</h1>
    <div class="card">
        <div class="card-body">
            {% for cat in all_category %}
                <a href="{% url 'category' cat.name %}" type="button" class="btn btn-outline-success btn-lg mt-3">{{ cat.name }}</a>
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
